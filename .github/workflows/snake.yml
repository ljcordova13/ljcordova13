name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *" # Runs daily
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: generate-github-contribution-grid-snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ljcordova13
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#22D3EE&color_dots=#161b22,#0d2e5c,#1d4ed8,#3b82f6,#60a5fa
            dist/github-contribution-grid-snake-dark.svg?color_snake=#22D3EE&color_dots=#161b22,#0d2e5c,#1d4ed8,#3b82f6,#60a5fa
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
          
      - name: push github-contribution-grid-snake to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" width="100%" height="380" xml:space="preserve">
  <defs>
    <!-- Fonts and Styles -->
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
      
      .term-text {
        font-family: 'JetBrains Mono', monospace;
        font-size: 14px;
        fill: #a9b1d6; /* Tokyo Night style light blue-gray */
      }
      .prompt {
        fill: #4ade80; /* Neon green */
        font-weight: bold;
      }
      .directory {
        fill: #38bdf8; /* Cyan */
      }
      .command {
        fill: #ffffff; /* White */
        font-weight: bold;
      }
      .output {
        fill: #d4d4d8; /* Light gray */
      }
      .bullet {
        fill: #38bdf8;
        font-weight: bold;
      }
      .cursor-blink {
        fill: #4ade80;
        animation: blink 1s step-end infinite;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
    ]]></style>
  </defs>

  <!-- Terminal Window Shadow & Container -->
  <rect width="798" height="378" x="1" y="1" rx="10" ry="10" fill="#000000" stroke="#333333" stroke-width="1.5" />

  <!-- macOS Style Window Header Bar -->
  <path d="M 1 11 A 10 10 0 0 1 11 1 L 787 1 A 10 10 0 0 1 797 11 L 797 32 L 1 32 Z" fill="#181818" />
  
  <!-- macOS Window Control Dots -->
  <circle cx="18" cy="16" r="6" fill="#ff5f56" />
  <circle cx="36" cy="16" r="6" fill="#ffbd2e" />
  <circle cx="54" cy="16" r="6" fill="#27c93f" />
  
  <!-- Terminal Window Title -->
  <text x="400" y="21" font-family="'JetBrains Mono', monospace" font-size="12" fill="#8e9093" text-anchor="middle">visitor@ljcordova-desktop: ~/about</text>

  <!-- Line 1: Prompt & Command 'cat about_me.txt' -->
  <text x="25" y="65" class="term-text">
    <tspan class="prompt">visitor@ljcordova.dev</tspan><tspan fill="#ffffff">:</tspan><tspan class="directory">~</tspan><tspan class="prompt">$ </tspan><tspan class="command">cat about_me.txt</tspan>
  </text>

  <!-- Biography Text Lines -->
  <text x="25" y="90" class="term-text output">I'm a full-stack developer and cloud integrator with expertise in JavaScript, TypeScript,</text>
  <text x="25" y="112" class="term-text output">Python, and managing AWS/Supabase cloud infrastructure. I contribute to open-source</text>
  <text x="25" y="134" class="term-text output">projects and build tools that help developers work more efficiently. My focus is on</text>
  <text x="25" y="156" class="term-text output">database management, secure deployment pipelines, clean code, and scalability.</text>

  <!-- Line 3: Prompt & Command 'cat interests.txt' -->
  <text x="25" y="200" class="term-text">
    <tspan class="prompt">visitor@ljcordova.dev</tspan><tspan fill="#ffffff">:</tspan><tspan class="directory">~</tspan><tspan class="prompt">$ </tspan><tspan class="command">cat interests.txt</tspan>
  </text>

  <!-- Interests Lines -->
  <text x="25" y="225" class="term-text output"><tspan class="bullet">&gt; </tspan><tspan fill="#ffffff" font-weight="bold">Backend Development</tspan> – Building robust APIs and microservices</text>
  <text x="25" y="247" class="term-text output"><tspan class="bullet">&gt; </tspan><tspan fill="#ffffff" font-weight="bold">Frontend Development</tspan> – Creating responsive, modern user interfaces</text>
  <text x="25" y="269" class="term-text output"><tspan class="bullet">&gt; </tspan><tspan fill="#ffffff" font-weight="bold">Data &amp; Analytics</tspan> – Visualizing and processing data at scale</text>
  <text x="25" y="291" class="term-text output"><tspan class="bullet">&gt; </tspan><tspan fill="#ffffff" font-weight="bold">Cloud Architecture</tspan> – AWS, Docker, and containerization</text>
  <text x="25" y="313" class="term-text output"><tspan class="bullet">&gt; </tspan><tspan fill="#ffffff" font-weight="bold">Open Source</tspan> – Contributing to the developer community</text>

  <!-- Line 4: Final prompt and blinking cursor -->
  <text x="25" y="348" class="term-text">
    <tspan class="prompt">visitor@ljcordova.dev</tspan><tspan fill="#ffffff">:</tspan><tspan class="directory">~</tspan><tspan class="prompt">$ </tspan>
  </text>
  <rect x="235" y="335" width="8" height="15" class="cursor-blink" />
</svg>

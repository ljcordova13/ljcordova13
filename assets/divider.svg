<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 20" width="100%" height="20">
  <defs>
    <linearGradient id="divGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0" />
      <stop offset="15%" stop-color="#3B82F6" stop-opacity="0.6" />
      <stop offset="50%" stop-color="#22D3EE" stop-opacity="1" />
      <stop offset="85%" stop-color="#8B5CF6" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0" />
    </linearGradient>
    <style>
      .pulse-dot {
        fill: #22D3EE;
        animation: pulseDot 4s infinite alternate;
        transform-origin: 400px 10px;
      }
      @keyframes pulseDot {
        0% { r: 2; opacity: 0.3; }
        100% { r: 5; opacity: 0.9; }
      }
    </style>
  </defs>
  <line x1="0" y1="10" x2="800" y2="10" stroke="url(#divGrad)" stroke-width="2.5" />
  <circle cx="400" cy="10" r="3.5" class="pulse-dot" />
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 24" width="100%" height="24" xml:space="preserve">
  <defs>
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap');
      .prompt {
        font-family: 'JetBrains Mono', monospace;
        font-size: 13px;
        fill: #4ade80;
        font-weight: bold;
      }
      .terminal-line {
        stroke: #262626;
        stroke-width: 1.5;
      }
      .cursor {
        fill: #4ade80;
        animation: blink 1s step-end infinite;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
    ]]></style>
  </defs>
  <!-- Prompt Symbol -->
  <text x="15" y="16" class="prompt">$</text>
  
  <!-- Line Cut -->
  <line x1="35" y1="12" x2="775" y2="12" class="terminal-line" />
  
  <!-- Blinking Cursor Box at the end of the section cut -->
  <rect x="777" y="5" width="8" height="14" class="cursor" />
</svg>

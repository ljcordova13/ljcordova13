<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="100%" height="320" xml:space="preserve">
  <defs>
    <!-- Fonts and Styles -->
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
      
      .term-text {
        font-family: 'JetBrains Mono', monospace;
        font-size: 14px;
        fill: #a9b1d6; /* Tokyo Night style light blue-gray */
      }
      .prompt {
        fill: #4ade80; /* Neon green */
        font-weight: bold;
      }
      .directory {
        fill: #38bdf8; /* Cyan */
      }
      .command {
        fill: #ffffff; /* White */
        font-weight: bold;
      }
      .output {
        fill: #d4d4d8; /* Light gray */
      }
      .output-blue {
        fill: #60a5fa;
      }
      .output-green {
        fill: #4ade80;
      }
      .cursor-blink {
        fill: #4ade80;
        animation: blink 1s step-end infinite;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
    ]]></style>

    <!-- Clip Paths for Typing Effects -->
    <clipPath id="clip-whoami">
      <rect x="235" y="45" width="0" height="25">
        <animate attributeName="width" from="0" to="65" dur="0.6s" begin="0.4s" fill="freeze" />
      </rect>
    </clipPath>
    
    <clipPath id="clip-cat">
      <rect x="235" y="95" width="0" height="25">
        <animate attributeName="width" from="0" to="140" dur="1.0s" begin="1.5s" fill="freeze" />
      </rect>
    </clipPath>
  </defs>

  <!-- Terminal Window Shadow & Container -->
  <rect width="798" height="318" x="1" y="1" rx="10" ry="10" fill="#000000" stroke="#333333" stroke-width="1.5" />

  <!-- macOS Style Window Header Bar -->
  <path d="M 1 11 A 10 10 0 0 1 11 1 L 787 1 A 10 10 0 0 1 797 11 L 797 32 L 1 32 Z" fill="#181818" />
  
  <!-- macOS Window Control Dots -->
  <circle cx="18" cy="16" r="6" fill="#ff5f56" />
  <circle cx="36" cy="16" r="6" fill="#ffbd2e" />
  <circle cx="54" cy="16" r="6" fill="#27c93f" />
  
  <!-- Terminal Window Title -->
  <text x="400" y="21" font-family="'JetBrains Mono', monospace" font-size="12" fill="#8e9093" text-anchor="middle">visitor@ljcordova-desktop: ~</text>

  <!-- Line 1: Prompt & Command 'whoami' -->
  <text x="25" y="65" class="term-text">
    <tspan class="prompt">visitor@ljcordova.dev</tspan><tspan fill="#ffffff">:</tspan><tspan class="directory">~</tspan><tspan class="prompt">$ </tspan>
  </text>
  <g clip-path="url(#clip-whoami)">
    <text x="235" y="65" class="term-text command">whoami</text>
  </g>
  <!-- Moving Cursor for Line 1 -->
  <rect x="235" y="52" width="8" height="15" fill="#4ade80" opacity="1">
    <animate attributeName="x" from="235" to="300" dur="0.6s" begin="0.4s" fill="freeze" />
    <animate attributeName="opacity" from="1" to="0" dur="0.1s" begin="1.1s" fill="freeze" />
  </rect>

  <!-- Line 2: Output of 'whoami' -->
  <g opacity="0">
    <text x="25" y="90" class="term-text output">ljcordova</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="1.1s" fill="freeze" />
  </g>

  <!-- Line 3: Prompt & Command 'cat profile.json' -->
  <g opacity="0">
    <text x="25" y="115" class="term-text">
      <tspan class="prompt">visitor@ljcordova.dev</tspan><tspan fill="#ffffff">:</tspan><tspan class="directory">~</tspan><tspan class="prompt">$ </tspan>
    </text>
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="1.3s" fill="freeze" />
  </g>
  <g clip-path="url(#clip-cat)">
    <text x="235" y="115" class="term-text command">cat profile.json</text>
  </g>
  <!-- Moving Cursor for Line 3 -->
  <rect x="235" y="102" width="8" height="15" fill="#4ade80" opacity="0">
    <set attributeName="opacity" to="1" begin="1.3s" />
    <animate attributeName="x" from="235" to="375" dur="1.0s" begin="1.5s" fill="freeze" />
    <animate attributeName="opacity" from="1" to="0" dur="0.1s" begin="2.7s" fill="freeze" />
  </rect>

  <!-- Line 4-9: JSON Outputs (sequential fade-in) -->
  <g opacity="0">
    <text x="25" y="140" class="term-text output">{</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="2.7s" fill="freeze" />
  </g>
  
  <g opacity="0">
    <text x="25" y="160" class="term-text output">  &quot;name&quot;: <tspan class="output-green">&quot;LJ Cordova&quot;</tspan>,</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="2.9s" fill="freeze" />
  </g>
  
  <g opacity="0">
    <text x="25" y="180" class="term-text output">  &quot;role&quot;: <tspan class="output-green">&quot;Full-Stack Developer &amp; Cloud Integrator&quot;</tspan>,</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="3.1s" fill="freeze" />
  </g>

  <g opacity="0">
    <text x="25" y="200" class="term-text output">  &quot;skills&quot;: [<tspan class="output-blue">&quot;JavaScript&quot;</tspan>, <tspan class="output-blue">&quot;TypeScript&quot;</tspan>, <tspan class="output-blue">&quot;Python&quot;</tspan>, <tspan class="output-blue">&quot;AWS&quot;</tspan>, <tspan class="output-blue">&quot;Supabase&quot;</tspan>],</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="3.3s" fill="freeze" />
  </g>

  <g opacity="0">
    <text x="25" y="220" class="term-text output">  &quot;focus&quot;: <tspan class="output-green">&quot;Clean code, secure deployment, scalable backend APIs&quot;</tspan></text>
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="3.5s" fill="freeze" />
  </g>

  <g opacity="0">
    <text x="25" y="240" class="term-text output">}</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="3.7s" fill="freeze" />
  </g>

  <!-- Line 10: Final prompt and infinite blinking cursor -->
  <g opacity="0">
    <text x="25" y="275" class="term-text">
      <tspan class="prompt">visitor@ljcordova.dev</tspan><tspan fill="#ffffff">:</tspan><tspan class="directory">~</tspan><tspan class="prompt">$ </tspan>
    </text>
    <rect x="235" y="262" width="8" height="15" class="cursor-blink" />
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="4.0s" fill="freeze" />
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="300" style="background-color: #070514; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.5);">
  <defs>
    <!-- Background Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255, 255, 255, 0.02)" stroke-width="1" />
    </pattern>

    <!-- Linear Gradients -->
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" /> <!-- Blue -->
      <stop offset="100%" stop-color="#8B5CF6" /> <!-- Purple -->
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4" /> <!-- Cyan -->
      <stop offset="100%" stop-color="#3B82F6" /> <!-- Blue -->
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.08)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.02)" />
    </linearGradient>

    <!-- Filters for Glow & Blur -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap');
      
      .floating {
        animation: float 6s ease-in-out infinite alternate;
      }
      .wave {
        animation: waveAnim 14s linear infinite;
        transform-origin: bottom center;
      }
      .wave2 {
        animation: waveAnim2 18s linear infinite;
        transform-origin: bottom center;
      }
      
      @keyframes float {
        0% { transform: translateY(0px); }
        100% { transform: translateY(-10px); }
      }
      @keyframes waveAnim {
        0% { transform: rotate(0deg) translate(0, 0); }
        50% { transform: rotate(1.5deg) translate(-15px, 8px); }
        100% { transform: rotate(0deg) translate(0, 0); }
      }
      @keyframes waveAnim2 {
        0% { transform: rotate(0deg) translate(0, 0); }
        50% { transform: rotate(-2.5deg) translate(15px, -4px); }
        100% { transform: rotate(0deg) translate(0, 0); }
      }

      /* Text Styles */
      .name-text {
        font-family: 'Outfit', sans-serif;
        font-weight: 800;
        font-size: 46px;
        fill: #FFFFFF;
        text-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
      }
      .title-text {
        font-family: 'Outfit', sans-serif;
        font-weight: 600;
        font-size: 20px;
        fill: #60A5FA;
      }
      .desc-text {
        font-family: 'Outfit', sans-serif;
        font-size: 14px;
        fill: #9CA3AF;
      }
      .typing-text {
        font-family: 'JetBrains Mono', monospace;
        font-size: 16px;
        fill: #22D3EE; /* Cyan */
        font-weight: bold;
      }

      .word1 { animation: cycle1 16s infinite; }
      .word2 { animation: cycle2 16s infinite; }
      .word3 { animation: cycle3 16s infinite; }
      .word4 { animation: cycle4 16s infinite; }
      
      @keyframes cycle1 {
        0%, 22% { opacity: 1; }
        23%, 100% { opacity: 0; }
      }
      @keyframes cycle2 {
        0%, 22% { opacity: 0; }
        25%, 47% { opacity: 1; }
        48%, 100% { opacity: 0; }
      }
      @keyframes cycle3 {
        0%, 47% { opacity: 0; }
        50%, 72% { opacity: 1; }
        73%, 100% { opacity: 0; }
      }
      @keyframes cycle4 {
        0%, 72% { opacity: 0; }
        75%, 97% { opacity: 1; }
        98%, 100% { opacity: 0; }
      }
    </style>
  </defs>

  <!-- Background Grid -->
  <rect width="100%" height="100%" fill="#070514" />
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- Animated Neon Gradient Wave Backgrounds -->
  <path class="wave" opacity="0.12" fill="url(#neonGrad)" d="M 0,260 C 150,220 300,280 450,230 C 600,180 700,270 800,240 L 800,300 L 0,300 Z" />
  <path class="wave2" opacity="0.08" fill="url(#cyanGrad)" d="M 0,240 C 200,270 350,200 500,250 C 650,300 720,220 800,260 L 800,300 L 0,300 Z" />

  <!-- Glow Accents -->
  <circle cx="150" cy="100" r="100" fill="#3B82F6" opacity="0.15" filter="url(#neonGlow)" />
  <circle cx="650" cy="180" r="120" fill="#8B5CF6" opacity="0.12" filter="url(#neonGlow)" />

  <!-- Centered Glassmorphism Card -->
  <g class="floating" transform="translate(100, 35)">
    <rect width="600" height="220" rx="16" fill="#0D0A21" opacity="0.75" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1.5" />
    <rect width="600" height="220" rx="16" fill="url(#glassGrad)" stroke="none" />

    <!-- Card Content -->
    <text x="300" y="55" text-anchor="middle" class="name-text">LJ Cordova</text>
    <text x="300" y="90" text-anchor="middle" class="title-text">Full-Stack Developer &amp; Cloud Integrator</text>
    <text x="300" y="125" text-anchor="middle" class="desc-text">Computer Engineering Graduate</text>

    <!-- Animated Typing Roles (stacked with opacity transitions) -->
    <text x="300" y="170" text-anchor="middle" class="typing-text word1">&gt; Building scalable backend APIs _</text>
    <text x="300" y="170" text-anchor="middle" class="typing-text word2">&gt; Deploying secure cloud infrastructure _</text>
    <text x="300" y="170" text-anchor="middle" class="typing-text word3">&gt; Designing responsive, modern web UIs _</text>
    <text x="300" y="170" text-anchor="middle" class="typing-text word4">&gt; Integrating IoT &amp; smart soil sensors _</text>

    <!-- Decorative border details -->
    <path d="M 20 20 L 50 20 L 60 30" fill="none" stroke="#22D3EE" stroke-width="1.5" opacity="0.3" />
    <circle cx="20" cy="20" r="3" fill="#22D3EE" opacity="0.7" />
    <path d="M 580 200 L 550 200 L 540 190" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.3" />
    <circle cx="580" cy="200" r="3" fill="#8B5CF6" opacity="0.7" />
  </g>
</svg>

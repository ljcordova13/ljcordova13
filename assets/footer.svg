<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 150" width="100%" height="150" xml:space="preserve">
  <defs>
    <!-- Fonts and Styles -->
    <style><![CDATA[
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
      
      .term-text {
        font-family: 'JetBrains Mono', monospace;
        font-size: 13px;
        fill: #a9b1d6;
      }
      .prompt {
        fill: #4ade80;
        font-weight: bold;
      }
      .directory {
        fill: #38bdf8;
      }
      .command {
        fill: #ffffff;
        font-weight: bold;
      }
      .output {
        fill: #d4d4d8;
      }
      .output-highlight {
        fill: #4ade80;
        font-weight: bold;
      }
      .heart {
        fill: #ff5f56;
      }
      .cursor-blink {
        fill: #4ade80;
        animation: blink 1s step-end infinite;
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
    ]]></style>

    <!-- Clip Path for typing exit -->
    <clipPath id="clip-exit">
      <rect x="235" y="45" width="0" height="25">
        <animate attributeName="width" from="0" to="40" dur="0.4s" begin="0.4s" fill="freeze" />
      </rect>
    </clipPath>
  </defs>

  <!-- Terminal Window Shadow & Container -->
  <rect width="798" height="148" x="1" y="1" rx="8" ry="8" fill="#000000" stroke="#333333" stroke-width="1.5" />

  <!-- macOS Style Window Header Bar -->
  <path d="M 1 9 A 8 8 0 0 1 9 1 L 791 1 A 8 8 0 0 1 799 9 L 799 30 L 1 30 Z" fill="#181818" />
  
  <!-- macOS Window Control Dots -->
  <circle cx="18" cy="15" r="5" fill="#ff5f56" />
  <circle cx="32" cy="15" r="5" fill="#ffbd2e" />
  <circle cx="46" cy="15" r="5" fill="#27c93f" />
  
  <!-- Terminal Window Title -->
  <text x="400" y="20" font-family="'JetBrains Mono', monospace" font-size="11" fill="#8e9093" text-anchor="middle">visitor@ljcordova-desktop: ~</text>

  <!-- Line 1: Prompt & exit command -->
  <text x="25" y="62" class="term-text">
    <tspan class="prompt">visitor@ljcordova.dev</tspan><tspan fill="#ffffff">:</tspan><tspan class="directory">~</tspan><tspan class="prompt">$ </tspan>
  </text>
  <g clip-path="url(#clip-exit)">
    <text x="235" y="62" class="term-text command">exit</text>
  </g>
  <!-- Moving Cursor for exit command -->
  <rect x="235" y="50" width="8" height="14" fill="#4ade80" opacity="1">
    <animate attributeName="x" from="235" to="270" dur="0.4s" begin="0.4s" fill="freeze" />
    <animate attributeName="opacity" from="1" to="0" dur="0.1s" begin="0.9s" fill="freeze" />
  </rect>

  <!-- Line 2: Output logout -->
  <g opacity="0">
    <text x="25" y="85" class="term-text output">logout</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="0.9s" fill="freeze" />
  </g>

  <!-- Line 3: Output Connection Closed & Thank you message -->
  <g opacity="0">
    <text x="25" y="108" class="term-text output">Connection to ljcordova.dev closed.</text>
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="1.2s" fill="freeze" />
  </g>

  <g opacity="0">
    <text x="25" y="130" class="term-text output">
      <tspan class="output-highlight">Thank you for visiting! Happy Coding! 🚀</tspan> | Built with <tspan class="heart">♥</tspan> by LJ Cordova
    </text>
    <animate attributeName="opacity" from="0" to="1" dur="0.1s" begin="1.5s" fill="freeze" />
  </g>
</svg>
